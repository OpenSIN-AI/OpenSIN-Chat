<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" width="1600" height="600" role="img" aria-label="OpenAfD — Sovereäner KI-Arbeitsraum">
  <title>OpenAfD — Sovereäner KI-Arbeitsraum</title>
  <defs>
    <linearGradient id="afd-blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0079b0"/>
      <stop offset="100%" stop-color="#009ee0"/>
    </linearGradient>
    <linearGradient id="arrow-red" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0%" stop-color="#c80a0a"/>
      <stop offset="100%" stop-color="#e8112d"/>
    </linearGradient>
  </defs>

  <!-- Linke Marke: offener Kreis (suggestive "O"/Open) -->
  <!-- Kreisbogen geöffnet unten-rechts -->
  <path d="M 100 200
           A 130 130 0 1 1 230 330"
        fill="none"
        stroke="url(#afd-blue)"
        stroke-width="38"
        stroke-linecap="round"/>

  <!-- Wortmarke: OpenAfD -->
  <text x="290" y="350"
        fill="#0a78c0"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="900"
        font-size="280"
        letter-spacing="-6">OpenAfD</text>

  <!-- Roter geschwungener Pfeil-Akzent unter der Wortmarke -->
  <path d="M 320 400
           C 600 480, 1100 480, 1370 405
           L 1340 380
           L 1490 410
           L 1340 470
           L 1320 440
           C 1050 525, 600 525, 300 450
           Z"
        fill="url(#arrow-red)"/>
</svg>
