<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="380" viewBox="0 0 1400 380" fill="none">
  <defs>
    <linearGradient id="bgGradL" x1="0" y1="0" x2="1400" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FAFAFA"/>
      <stop offset="0.5" stop-color="#F1F5F9"/>
      <stop offset="1" stop-color="#FAFAFA"/>
    </linearGradient>
    <linearGradient id="textGradL" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00A8D8"/>
      <stop offset="0.5" stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="accentLineL" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00A8D8"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="glowL" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlowL" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="380" fill="url(#bgGradL)"/>

  <!-- Hex grid pattern -->
  <g opacity="0.08" stroke="#00A8D8" stroke-width="1" fill="none">
    <path d="M 50 40 L 80 40 L 95 65 L 80 90 L 50 90 L 35 65 Z"/>
    <path d="M 110 40 L 140 40 L 155 65 L 140 90 L 110 90 L 95 65 Z"/>
    <path d="M 50 100 L 80 100 L 95 125 L 80 150 L 50 150 L 35 125 Z"/>
    <path d="M 110 100 L 140 100 L 155 125 L 140 150 L 110 150 L 95 125 Z"/>
    <path d="M 1250 40 L 1280 40 L 1295 65 L 1280 90 L 1250 90 L 1235 65 Z"/>
    <path d="M 1310 40 L 1340 40 L 1355 65 L 1340 90 L 1310 90 L 1295 65 Z"/>
    <path d="M 1250 100 L 1280 100 L 1295 125 L 1280 150 L 1250 150 L 1235 125 Z"/>
    <path d="M 1310 100 L 1340 100 L 1355 125 L 1340 150 L 1310 150 L 1295 125 Z"/>
  </g>

  <!-- HUD corners -->
  <g stroke="#00A8D8" stroke-width="2" fill="none" opacity="0.4">
    <path d="M 20 20 L 20 50 M 20 20 L 50 20"/>
    <path d="M 1380 20 L 1380 50 M 1380 20 L 1350 20"/>
    <path d="M 20 360 L 20 330 M 20 360 L 50 360"/>
    <path d="M 1380 360 L 1380 330 M 1380 360 L 1350 360"/>
  </g>

  <!-- Logo -->
  <g transform="translate(60, 110)">
    <path d="M 40 0 L 80 15 L 80 55 Q 80 90 40 110 Q 0 90 0 55 L 0 15 Z" fill="none" stroke="#00A8D8" stroke-width="2" filter="url(#softGlowL)" opacity="0.7"/>
    <path d="M 40 5 L 75 18 L 75 55 Q 75 85 40 102 Q 5 85 5 55 L 5 18 Z" fill="#F8FAFC" stroke="#00A8D8" stroke-width="1.5" opacity="0.5"/>
    <rect x="22" y="35" width="36" height="22" rx="4" fill="#00A8D8" opacity="0.85"/>
    <path d="M 30 57 L 30 65 L 38 57 Z" fill="#00A8D8" opacity="0.85"/>
    <circle cx="32" cy="46" r="2" fill="#FAFAFA"/>
    <circle cx="40" cy="46" r="2" fill="#FAFAFA"/>
    <circle cx="48" cy="46" r="2" fill="#FAFAFA"/>
  </g>

  <!-- Title -->
  <text x="180" y="130" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="52" font-weight="600" fill="url(#textGradL)" letter-spacing="-1">
    OpenSIN Chat
  </text>

  <!-- Subtitle -->
  <text x="180" y="162" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#475569" letter-spacing="0.5">
    Self-hosted AI workspace for political research &amp; knowledge management
  </text>

  <!-- Accent underline -->
  <rect x="180" y="175" width="200" height="2" rx="1" fill="url(#accentLineL)"/>

  <!-- Metric cards -->
  <g transform="translate(180, 210)">
    <text x="0" y="0" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="36" font-weight="600" fill="#00A8D8" filter="url(#glowL)">4</text>
    <text x="0" y="22" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#64748B" letter-spacing="1">MODULES</text>
    <rect x="0" y="26" width="40" height="2" rx="1" fill="#00A8D8" opacity="0.3"/>

    <text x="120" y="0" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="36" font-weight="600" fill="#0EA5E9" filter="url(#glowL)">12+</text>
    <text x="120" y="22" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#64748B" letter-spacing="1">LLM PROVIDERS</text>
    <rect x="120" y="26" width="40" height="2" rx="1" fill="#0EA5E9" opacity="0.3"/>

    <text x="280" y="0" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="36" font-weight="600" fill="#8B5CF6" filter="url(#glowL)">0</text>
    <text x="280" y="22" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#64748B" letter-spacing="1">TELEMETRY</text>
    <rect x="280" y="26" width="40" height="2" rx="1" fill="#8B5CF6" opacity="0.3"/>

    <text x="400" y="0" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="36" font-weight="600" fill="#00A8D8" filter="url(#glowL)">3K+</text>
    <text x="400" y="22" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#64748B" letter-spacing="1">TESTS PASSING</text>
    <rect x="400" y="26" width="40" height="2" rx="1" fill="#00A8D8" opacity="0.3"/>
  </g>

  <!-- Architecture flow -->
  <g transform="translate(880, 80)">
    <g>
      <rect x="0" y="0" width="140" height="44" rx="6" fill="#F8FAFC" stroke="#00A8D8" stroke-width="1.5" opacity="0.6"/>
      <text x="70" y="27" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#00A8D8">Chat UI</text>
      <line x1="70" y1="44" x2="70" y2="66" stroke="#00A8D8" stroke-width="1.5" opacity="0.3" stroke-dasharray="4 4"/>
      <rect x="0" y="66" width="140" height="44" rx="6" fill="#F8FAFC" stroke="#0EA5E9" stroke-width="1.5" opacity="0.6"/>
      <text x="70" y="93" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#0EA5E9">Agent Plugins</text>
      <line x1="70" y1="110" x2="70" y2="132" stroke="#0EA5E9" stroke-width="1.5" opacity="0.3" stroke-dasharray="4 4"/>
      <rect x="0" y="132" width="140" height="44" rx="6" fill="#F8FAFC" stroke="#8B5CF6" stroke-width="1.5" opacity="0.6"/>
      <text x="70" y="159" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#8B5CF6">Fireworks AI</text>
    </g>
    <line x1="140" y1="88" x2="180" y2="88" stroke="#00A8D8" stroke-width="1.5" opacity="0.2" stroke-dasharray="4 4"/>
    <g>
      <rect x="180" y="0" width="140" height="44" rx="6" fill="#F8FAFC" stroke="#00A8D8" stroke-width="1.5" opacity="0.4"/>
      <text x="250" y="27" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#00A8D8" opacity="0.7">Politician DB</text>
      <line x1="250" y1="44" x2="250" y2="66" stroke="#00A8D8" stroke-width="1.5" opacity="0.2" stroke-dasharray="4 4"/>
      <rect x="180" y="66" width="140" height="44" rx="6" fill="#F8FAFC" stroke="#0EA5E9" stroke-width="1.5" opacity="0.4"/>
      <text x="250" y="93" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#0EA5E9" opacity="0.7">Research Pipeline</text>
      <line x1="250" y1="110" x2="250" y2="132" stroke="#0EA5E9" stroke-width="1.5" opacity="0.2" stroke-dasharray="4 4"/>
      <rect x="180" y="132" width="140" height="44" rx="6" fill="#F8FAFC" stroke="#8B5CF6" stroke-width="1.5" opacity="0.4"/>
      <text x="250" y="159" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#8B5CF6" opacity="0.7">PDF Reports</text>
    </g>
  </g>

  <!-- Terminal code card -->
  <g transform="translate(180, 280)">
    <rect x="0" y="0" width="360" height="56" rx="8" fill="#1E293B" opacity="0.95"/>
    <rect x="0" y="0" width="360" height="20" rx="8" fill="#334155"/>
    <rect x="0" y="12" width="360" height="8" fill="#334155"/>
    <circle cx="12" cy="10" r="4" fill="#EF4444" opacity="0.7"/>
    <circle cx="24" cy="10" r="4" fill="#F59E0B" opacity="0.7"/>
    <circle cx="36" cy="10" r="4" fill="#22C55E" opacity="0.7"/>
    <text x="14" y="42" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#00D9FF">$</text>
    <text x="28" y="42" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#94A3B8">docker compose up -d</text>
  </g>

  <!-- Pulse ring on logo -->
  <circle cx="100" cy="165" r="55" fill="none" stroke="#00A8D8" stroke-width="1" opacity="0.3">
    <animate attributeName="r" from="55" to="65" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.3" to="0" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>