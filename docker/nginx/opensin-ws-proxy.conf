# OpenSIN-Chat nginx Reverse Proxy Config
#
# Deploy to: /etc/nginx/sites-available/opensin-ws-proxy
# Symlink:   /etc/nginx/sites-enabled/opensin-ws-proxy
#
# This config fixes the PDF upload stall at ~72% by setting
# client_max_body_size to match the multer upload limit (200MB default).
# Without this, nginx defaults to 1MB and silently drops the connection
# mid-upload, causing the XHR to stall indefinitely.
#
# After deploying:
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 38481;
    server_name localhost;

    # Allow file uploads up to 256MB (multer default is 200MB).
    # Without this directive, nginx defaults to 1MB and silently
    # drops connections for larger uploads — the #1 cause of the
    # "upload stalls at 72%" bug.
    client_max_body_size 256m;

    # Timeouts for large uploads + slow OCR processing.
    # Default proxy_read_timeout is 60s — too short for PDF parsing.
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_connect_timeout 10s;

    # Buffer settings for large request bodies
    proxy_buffering off;
    proxy_request_buffering off;

    location / {
        proxy_pass http://127.0.0.1:38471;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade headers (Cloudflare strips these)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # SSE support: disable buffering for streaming responses
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }
}
