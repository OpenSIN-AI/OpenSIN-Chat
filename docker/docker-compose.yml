# Purpose: Production Docker Compose for OpenSIN Chat + Vane sidecar.
# Docs: docker/docker-compose.yml.doc.md
name: opensin

networks:
  opensin-chat:
    driver: bridge
  haus-netzwerk:
    # Optional: only required for the multi-host sin-supabase deployment.
    # For local single-host setups, comment out the `networks: - haus-netzwerk`
    # lines under each service. See docker/HOW_TO_USE_DOCKER.md for details.
    external: true
    name: ${HAUS_NETZWERK_NAME:-haus-netzwerk}

services:
  fix-permissions:
    # Pinned by version tag + multi-arch index digest (#536).
    # Verified 2026-07-12 via Docker Hub API. Update tag AND digest together.
    image: busybox:1.37.0@sha256:9532d8c39891ca2ecde4d30d7710e01fb739c87a8b9299685c63704296b16028
    container_name: opensin-fix-perms
    volumes:
      - "../server/storage:/storage"
    user: root
    command: >
      sh -c "chown -R 1000:1000 /storage && mkdir -p /storage/tmp /storage/models /storage/vector-cache /storage/lancedb /storage/direct-uploads /storage/documents && chmod -R ug+rwX /storage && echo 'Permissions fixed'"
    restart: "no"

  opensin-chat:
    # TODO(#536): Pin by SHA256 digest for supply-chain integrity.
    # If the image 'opensin-app:v1.14.0' exists locally, use it.
    # Otherwise, build from source using the Dockerfile below.
    # To force a rebuild: docker compose build --no-cache
    image: opensin-app:v1.14.0
    container_name: opensin-app
    restart: always
    depends_on:
      fix-permissions:
        condition: service_completed_successfully
    build:
      context: ../.
      dockerfile: ./docker/Dockerfile
      args:
        ARG_UID: ${UID:-1000}
        ARG_GID: ${GID:-1000}
        SKIP_CHROMIUM: "1"
    volumes:
      - "./.env:/app/server/.env:ro"
      - "../server/storage:/app/server/storage"
      - "../collector/hotdir/:/app/collector/hotdir"
      - "../collector/outputs/:/app/collector/outputs"
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      # Host 38471 is a rare, high port to avoid clashing with legacy deployments on host 3001.
      # Container still listens on 3001 (SERVER_PORT in .env).
      - "38471:3001"
    env_file:
      - .env
    environment:
      # Explicitly set STORAGE_DIR so the container always knows where to
      # persist data, even if it is missing from .env. Must match the mounted
      # volume target (../server/storage -> /app/server/storage).
      - STORAGE_DIR=/app/server/storage
      - AUTH_TOKEN=${AUTH_TOKEN:?AUTH_TOKEN env var is required in production}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET env var is required in production}
      - SIG_KEY=${SIG_KEY:?SIG_KEY env var is required in production}
      - SIG_SALT=${SIG_SALT:?SIG_SALT env var is required in production}
      - LLM_PROVIDER=${LLM_PROVIDER:-generic-openai}
      - GENERIC_OPEN_AI_BASE_PATH=${GENERIC_OPEN_AI_BASE_PATH}
      - GENERIC_OPEN_AI_API_KEY=${GENERIC_OPEN_AI_API_KEY}
      - GENERIC_OPEN_AI_MODEL_PREF=${GENERIC_OPEN_AI_MODEL_PREF}
      - GENERIC_OPEN_AI_MODEL_TOKEN_LIMIT=${GENERIC_OPEN_AI_MODEL_TOKEN_LIMIT:-202752}
      - PGVECTOR_CONNECTION_STRING=${PGVECTOR_CONNECTION_STRING}
    networks:
      - opensin-chat
      - haus-netzwerk
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2'

  # --- Docling PDF-Parsing Service (optional) --------------------------------
  # Docling (IBM, MIT licence) uses a vision model for layout analysis.
  # It understands two-column layouts, tables, and headings — significantly
  # better than pdf.js text extraction for German Drucksachen / Plenarprotokolle.
  #
  # Activation: set DOCLING_ENDPOINT=http://docling:5001 in .env
  # The service is disabled by default (profiles: [docling]) — activate with:
  #   docker compose --profile docling up -d
  #
  # Resource note: the image pulls ~2 GB and requires ~3 GB RAM at peak.
  # Lower RAM deployments should leave this service disabled.
  docling:
    image: quay.io/docling-project/docling-serve:latest
    container_name: opensin-docling
    profiles: ["docling"]
    ports:
      - "127.0.0.1:${DOCLING_PORT:-5001}:5001"
    environment:
      - DOCLING_SERVE_ENABLE_UI=false
      - DOCLING_SERVE_MAX_ASYNC_JOBS=2
    restart: unless-stopped
    networks:
      - opensin-chat
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 3g
          cpus: '2'

  vane:
    # Third-party image pinned by version tag + SHA256 digest (#536).
    # Digest is the multi-arch manifest of v1.12.2, verified 2026-07-12 via
    # the Docker Hub API. Update tag AND digest together when bumping.
    image: itzcrazykns1337/vane:v1.12.2@sha256:61f2bbf3386ff3df08911fb3de0e1893b04702a4d49ef13fbadbda937b47ab7c
    container_name: opensin-vane
    ports:
      # Host 8310 → container 8300. Internal 8300 avoids clashing with
      # common defaults (3000) and keeps OpenSIN ports isolated.
      - "127.0.0.1:${VANE_PORT:-8310}:8300"
    environment:
      - PORT=8300
    volumes:
      - vane-data:/home/vane/data
    restart: unless-stopped
    networks:
      - opensin-chat
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1'

volumes:
  vane-data:
