# Purpose: Production Docker Compose for OpenSIN Chat + Vane sidecar.
# Docs: docker/docker-compose.yml.doc.md
name: opensin

networks:
  opensin-chat:
    driver: bridge

services:
  opensin-chat:
    image: opensin-app:v1.13.0
    container_name: opensin-app
    restart: always
    build:
      context: ../.
      dockerfile: ./docker/Dockerfile
      args:
        ARG_UID: ${UID:-1000}
        ARG_GID: ${GID:-1000}
    volumes:
      - "./.env:/app/server/.env:ro"
      - "../server/storage:/app/server/storage"
      - "../collector/hotdir/:/app/collector/hotdir"
      - "../collector/outputs/:/app/collector/outputs"
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      # Host 38471 is a rare, high port to avoid clashing with OpenAfD on host 3001.
      # Container still listens on 3001 (SERVER_PORT in .env).
      - "38471:3001"
    env_file:
      - .env
    environment:
      # Explicitly set STORAGE_DIR so the container always knows where to
      # persist data, even if it is missing from .env. Must match the mounted
      # volume target (../server/storage -> /app/server/storage).
      - STORAGE_DIR=/app/server/storage
      - JWT_SECRET=${JWT_SECRET}
      - SIG_KEY=${SIG_KEY}
      - SIG_SALT=${SIG_SALT}
      - LLM_PROVIDER=${LLM_PROVIDER:-generic-openai}
      - GENERIC_OPEN_AI_BASE_PATH=${GENERIC_OPEN_AI_BASE_PATH}
      - GENERIC_OPEN_AI_API_KEY=${GENERIC_OPEN_AI_API_KEY}
      - GENERIC_OPEN_AI_MODEL_PREF=${GENERIC_OPEN_AI_MODEL_PREF}
      - GENERIC_OPEN_AI_MODEL_TOKEN_LIMIT=${GENERIC_OPEN_AI_MODEL_TOKEN_LIMIT:-202752}
    networks:
      - opensin-chat
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2'

  vane:
    image: itzcrazykns1337/vane:v1.0.0
    container_name: opensin-vane
    ports:
      # Host 8310 → container 8300. Internal 8300 avoids clashing with
      # common defaults (3000) and keeps OpenSIN ports isolated.
      - "8310:8300"
    environment:
      - PORT=8300
    volumes:
      - vane-data:/home/vane/data
    restart: unless-stopped
    networks:
      - opensin-chat
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1'

volumes:
  vane-data:
