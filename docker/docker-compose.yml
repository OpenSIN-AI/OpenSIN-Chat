name: openafd

networks:
  opensin-chat:
    driver: bridge

services:
  opensin-chat:
    container_name: openafd
    restart: always
    build:
      context: ../.
      dockerfile: ./docker/Dockerfile
      args:
        ARG_UID: ${UID:-1000}
        ARG_GID: ${GID:-1000}
    cap_add:
      - SYS_ADMIN
    volumes:
      - "./.env:/app/server/.env"
      - "../server/storage:/app/server/storage"
      - "../collector/hotdir/:/app/collector/hotdir"
      - "../collector/outputs/:/app/collector/outputs"
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      # Explicitly set STORAGE_DIR so the container always knows where to
      # persist data, even if it is missing from .env. Must match the mounted
      # volume target (../server/storage -> /app/server/storage).
      - STORAGE_DIR=/app/server/storage
    networks:
      - opensin-chat
    extra_hosts:
      - "host.docker.internal:host-gateway"
