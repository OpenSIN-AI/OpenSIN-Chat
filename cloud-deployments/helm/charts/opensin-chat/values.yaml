replicaCount: 1

initContainers: []
  # - name: init-myservice
  #   image: busybox
  #   command: ['sh', '-c', 'chown -R 1000:1000 /storage']

image:
  repository: ghcr.io/opensin-ai/opensin-chat
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

persistentVolume:
  accessModes:
    - ReadWriteOnce
  labels: {}
  annotations: {}
  existingClaim: ""
  size: 8Gi
  mountPath: /app/server/storage
  storageClass: ""
  selector: {}
  volumeName: ""

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

# RollingUpdate for zero-downtime multi-replica deployments.
# Use Recreate only if the storage backend does not support concurrent access.
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/path: /metrics
  prometheus.io/port: "3001"

podLabels: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false

config:
  DISABLE_TELEMETRY: "true"
  NODE_ENV: production
  STORAGE_DIR: /app/server/storage
  UID: "1000"
  GID: "1000"

env: {}
envFrom: {}

service:
  type: ClusterIP
  port: 3001

# Redis configuration for horizontal scaling (E5-D3).
# When enabled, RATE_LIMIT_BACKEND=redis and REDIS_URL are injected as env vars.
# The app uses JWT for auth (stateless), so Redis is only needed for rate limiting.
redis:
  enabled: false
  # External Redis URL. If empty and redis.enabled=true, uses the bundled Redis subchart.
  url: ""
  # Bundled Redis subchart (Bitnami). Only used when url is empty.
  subchart:
    image:
      repository: redis
      tag: "7-alpine"
    persistence:
      enabled: true
      size: 1Gi

# PodDisruptionBudget ensures voluntary evictions don't take down all replicas.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# HorizontalPodAutoscaler for CPU/memory-based auto-scaling.
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# ServiceMonitor for Prometheus Operator (optional).
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}

httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
  - name: gateway
    sectionName: http
  hostnames:
  - chart-example.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /headers

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 2Gi

# Probes use the actual /ping endpoint on port 3001.
# The startup probe prevents premature liveness failures on slow Prisma migrations.
startupProbe:
  httpGet:
    path: /ping
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 30

readinessProbe:
  httpGet:
    path: /ping
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  successThreshold: 2

livenessProbe:
  httpGet:
    path: /ping
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  failureThreshold: 3

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}

extraObjects: []
