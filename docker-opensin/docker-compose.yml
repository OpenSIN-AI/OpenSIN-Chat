name: opensin-chat

networks:
  opensin-chat:
    driver: bridge

services:
  opensin-chat:
    container_name: ${COMPOSE_CONTAINER_NAME:-opensin-chat}
    restart: always
    build:
      context: ../.
      dockerfile: ./docker/Dockerfile
      args:
        ARG_UID: ${UID:-1000}
        ARG_GID: ${GID:-1000}
        SKIP_CHROMIUM: ${SKIP_CHROMIUM:-1}
    cap_add:
      - SYS_ADMIN
    volumes:
      - "../server/storage-opensin:/app/server/storage"
      - "../collector/hotdir/:/app/collector/hotdir"
      - "../collector/outputs/:/app/collector/outputs"
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "${COMPOSE_PORT:-43939}:3001"
    env_file:
      - ../.env
      - .env
    environment:
      - STORAGE_DIR=/app/server/storage
      - DATABASE_URL=file:/app/server/storage/openafd.db
    networks:
      - opensin-chat
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2'
