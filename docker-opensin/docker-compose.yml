name: opensin-chat

networks:
  opensin-chat:
    driver: bridge

services:
  opensin-chat:
    image: "${OPENSIN_IMAGE_REPOSITORY:-opensin-chat}:${OPENSIN_IMAGE_TAG:-local}"
    container_name: "${COMPOSE_CONTAINER_NAME:-opensin-chat}"

    build:
      context: ..
      dockerfile: ./docker/Dockerfile
      args:
        ARG_UID: "${UID:-1000}"
        ARG_GID: "${GID:-1000}"
        SKIP_CHROMIUM: "${SKIP_CHROMIUM:-1}"
        CHROMIUM_SHA256: "${CHROMIUM_SHA256:-}"
        CHROMIUM_DOWNLOAD_URL: "${CHROMIUM_DOWNLOAD_URL:-https://webassets.anythingllm.com/chromium-1088-linux-arm64.zip}"
        VITE_ENABLE_IMAGE_GENERATION: "${VITE_ENABLE_IMAGE_GENERATION:-false}"
        VITE_ENABLE_VIDEO_GENERATION: "${VITE_ENABLE_VIDEO_GENERATION:-false}"
        VITE_ENABLE_CVOICE_TTS: "${VITE_ENABLE_CVOICE_TTS:-false}"

    init: true
    restart: unless-stopped

    user: "${UID:-1000}:${GID:-1000}"

    cap_drop:
      - ALL

    security_opt:
      - no-new-privileges:true

    pids_limit: 512
    stop_grace_period: 30s

    ports:
      - "${COMPOSE_BIND_ADDRESS:-127.0.0.1}:${COMPOSE_PORT:-43939}:3001"

    volumes:
      - "../server/storage-opensin:/app/server/storage:rw"
      - "../collector/hotdir:/app/collector/hotdir:rw"
      - "../collector/outputs:/app/collector/outputs:rw"

    tmpfs:
      - "/tmp:size=256m,mode=1777"

    env_file:
      - ../.env
      - .env

    environment:
      NODE_ENV: production
      STORAGE_DIR: /app/server/storage
      DATABASE_URL: file:/app/server/storage/opensin.db

      ENABLE_IMAGE_GENERATION: "${ENABLE_IMAGE_GENERATION:-false}"
      ENABLE_VIDEO_GENERATION: "${ENABLE_VIDEO_GENERATION:-false}"
      ENABLE_CVOICE_TTS: "${ENABLE_CVOICE_TTS:-false}"

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/ping').then(r=>r.ok?r.json():Promise.reject(new Error(String(r.status)))).then(data=>process.exit(data.online===true?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 45s

    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: "5"

    networks:
      - opensin-chat

    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2"
