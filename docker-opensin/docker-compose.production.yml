# Production resource and lifecycle overrides.
#
# Usage:
# docker compose \
#   -f docker-compose.yml \
#   -f docker-compose.production.yml \
#   up -d

name: opensin-chat

services:
  opensin-chat:
    restart: unless-stopped
    pull_policy: never

    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "4"
        reservations:
          memory: 512m
