name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3a93e3444e15be6668339c0b1f3a0642e
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  no-tracked-dotenv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3a93e3444e15be6668339c0b1f3a0642e
      - name: Fail if a real .env file is tracked
        run: |
          if git ls-files | grep -E '(^|/)\.env($|\.)' | grep -vE '\.(example|sample|template)$'; then
            echo "::error::A real .env file is tracked in git. Remove it with: git rm --cached <file>"
            exit 1
          fi
          echo "OK: no real .env files tracked."
