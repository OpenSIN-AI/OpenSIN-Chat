name: CEO Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: server/yarn.lock

      - name: Install server dependencies
        working-directory: server
        run: yarn install --frozen-lockfile --network-timeout 100000

      - name: Dependency audit (moderate+)
        working-directory: server
        run: yarn audit --level moderate || true

      - name: Check for hardcoded secrets
        run: |
          ! grep -rE '(password|secret|token|api.key)\s*=\s*["\x27][^"\x27]{8,}' \
            --include="*.js" --include="*.ts" \
            server/ \
            --exclude-dir=node_modules || exit 1

      - name: Verify no eval/exec/spawn with user input
        run: |
          ! grep -rn 'eval(' server/ --include="*.js" --exclude-dir=node_modules || exit 1
          ! grep -rn 'child_process.spawn(' server/ --include="*.js" --exclude-dir=node_modules || exit 1

      - name: Check CoDocs references
        run: |
          pip install sin-code-bundle 2>/dev/null || true
          sin codocs check || echo "CoDocs check: install sin-code-bundle for full check"

      - name: Branding lint
        run: |
          node .github/scripts/branding-lint.js || true
