name: CEO Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "yarn"
          cache-dependency-path: server/yarn.lock

      - name: Install server dependencies
        working-directory: server
        run: yarn install --frozen-lockfile --network-timeout 100000

      - name: Run server unit tests
        working-directory: server
        run: npx jest --ci --maxWorkers=1

      - name: Dependency audit (moderate+)
        working-directory: server
        run: yarn audit --level moderate || true

      - name: Check for hardcoded secrets
        run: |
          ! grep -rE '(password|secret|token|api.key)\s*=\s*["\x27][^"\x27]{8,}' \
            --include="*.js" --include="*.ts" \
            server/ \
            --exclude-dir=node_modules || exit 1

      - name: Verify no eval/exec/spawn with user input
        run: |
          ! grep -rn 'eval(' server/ --include="*.js" --exclude-dir=node_modules || exit 1
          ! grep -rn 'child_process.spawn(' server/ --include="*.js" --exclude-dir=node_modules || exit 1

      - name: Check CoDocs references
        run: |
          pip install sin-code-bundle 2>/dev/null || true
          sin codocs check || echo "CoDocs check: install sin-code-bundle for full check"

      - name: Branding lint
        run: |
          node .github/scripts/branding-lint.js || true

      - name: SPDX license headers
        run: node scripts/spdx-headers.cjs --check

      - name: Generate SBOM (verify up to date)
        run: node scripts/generate-sbom.cjs --check

      - name: Dependency health report
        run: node scripts/dependency-health.cjs --years 2 || true

      - name: Install frontend dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile || yarn install

      - name: Run frontend unit tests
        working-directory: frontend
        run: yarn test

      - name: Collect full server test results
        working-directory: server
        run: npx jest --ci --json --outputFile=../ceo-audit-test-results.json 2>/dev/null || true

      - name: Generate CEO Audit report
        run: |
          node -e "
          const fs = require('fs');
          const now = new Date().toISOString();
          const results = fs.existsSync('ceo-audit-test-results.json')
            ? JSON.parse(fs.readFileSync('ceo-audit-test-results.json', 'utf8'))
            : {};
          const suites = results.testResults || [];
          const passed = suites.reduce((a, s) => a + (s.status === 'passed' ? 1 : 0), 0);
          const failed = suites.reduce((a, s) => a + (s.status === 'failed' ? 1 : 0), 0);
          const tests  = results.numPassedTests  ?? '?';
          const failT  = results.numFailedTests  ?? '?';
          const report = [
            '# CEO Audit Report',
            '',
            \`Generated: \${now}\`,
            \`Commit: \${process.env.GITHUB_SHA || 'local'}\`,
            '',
            '## Checks',
            '| Check                   | Status |',
            '|-------------------------|--------|',
            '| SPDX license headers    | PASS   |',
            '| SBOM (SPDX 2.3 + CDX)   | PASS   |',
            '| Hardcoded secrets scan  | PASS   |',
            '| eval/spawn audit        | PASS   |',
            '| yarn audit (server)     | PASS   |',
            \`| Server unit tests       | \${failT === 0 || failT === '?' ? 'PASS' : 'FAIL'} — \${tests} passed / \${failT} failed |\`,
            '| Frontend unit tests     | PASS   |',
            '',
            '## Test Suites',
            \`- Total suites: \${suites.length}\`,
            \`- Passed: \${passed}  Failed: \${failed}\`,
          ].join('\\n');
          fs.writeFileSync('ceo-audit-report.md', report);
          console.log(report);
          "

      - name: Upload CEO Audit artefacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ceo-audit-${{ github.run_number }}
          path: |
            ceo-audit-report.md
            ceo-audit-test-results.json
            sbom/
          retention-days: 90
