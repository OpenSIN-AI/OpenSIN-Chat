name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  statuses: write

jobs:
  # Trigger the self-hosted CI pipeline on the OCI VM.
  # The actual work (build, test, lint, deploy) runs there — not on
  # GitHub runners. The webhook receiver at ci.delqhi.com handles
  # everything and reports commit status back to GitHub.
  # This workflow is a no-op stub that just confirms the webhook was
  # received by checking the commit status appears within 30s.
  trigger:
    name: Self-hosted CI
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Trigger self-hosted pipeline
        run: |
          echo "CI runs on the OCI VM via webhook receiver at ci.delqhi.com"
          echo "Commit status will be set by the self-hosted runner."
          echo "If this check stays pending for >5min, check VM health."
