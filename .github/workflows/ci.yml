name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  YARN_VERSION: "1.22.22"

jobs:
  maintenance:
    name: Maintenance scripts
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Syntax-check maintenance scripts
        run: node --check scripts/enable-multi-user.cjs

      - name: Test maintenance scripts
        run: node --test scripts/*.test.cjs

      - name: Validate shell scripts
        run: |
          bash -n scripts/deploy-production.sh
          bash -n scripts/generate-auth-token.sh

      - name: Validate Docker Compose
        run: |
          cp docker-opensin/.env.example docker-opensin/.env
          docker compose \
            -f docker-opensin/docker-compose.yml \
            -f docker-opensin/docker-compose.production.yml \
            config >/dev/null

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Activate Yarn
        run: |
          corepack enable
          corepack prepare "yarn@${YARN_VERSION}" --activate
          yarn --version

      - name: Install frontend dependencies
        run: |
          yarn --cwd frontend install \
            --frozen-lockfile \
            --network-timeout 600000

      - name: Lint frontend
        run: yarn --cwd frontend lint:check

      - name: Type-check frontend
        run: yarn --cwd frontend type-check

      - name: Verify translations
        run: yarn --cwd frontend verify:translations

      - name: Test frontend
        run: yarn --cwd frontend test

      - name: Build frontend
        run: yarn --cwd frontend build

  server:
    name: Server
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Activate Yarn
        run: |
          corepack enable
          corepack prepare "yarn@${YARN_VERSION}" --activate
          yarn --version

      - name: Install server dependencies
        run: |
          yarn --cwd server install \
            --frozen-lockfile \
            --network-timeout 600000

      - name: Lint server
        run: yarn --cwd server lint:check

      - name: Type-check server
        run: yarn --cwd server type-check

      - name: Check circular dependencies
        run: yarn --cwd server check:circular

      - name: Test server
        run: yarn --cwd server test

  collector:
    name: Collector
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Activate Yarn
        run: |
          corepack enable
          corepack prepare "yarn@${YARN_VERSION}" --activate
          yarn --version

      - name: Install collector dependencies
        run: |
          yarn --cwd collector install \
            --frozen-lockfile \
            --network-timeout 600000

      - name: Lint collector
        run: yarn --cwd collector lint:check

      - name: Test collector
        run: yarn --cwd collector test

  container:
    name: Production container
    runs-on: ubuntu-latest
    timeout-minutes: 50
    needs:
      - maintenance
      - frontend
      - server
      - collector

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        run: |
          docker buildx build \
            --load \
            --file docker/Dockerfile \
            --build-arg SKIP_CHROMIUM=1 \
            --tag opensin-chat:ci \
            .

      - name: Inspect image
        run: |
          docker image inspect opensin-chat:ci >/dev/null
