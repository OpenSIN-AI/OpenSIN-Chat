name: PR Lint & Test (GitHub-hosted)

# Run on every PR to main.
# This is the required status check that gates mergeability.
# Self-hosted CI pipeline (on OCI VM) remains separate for deploy.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"
          cache-dependency-path: |
            frontend/yarn.lock
            server/yarn.lock
            collector/yarn.lock

      - name: Activate Yarn
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          yarn --version

      - name: Install dependencies
        run: |
          cd frontend && yarn install --frozen-lockfile
          cd ../server && yarn install --frozen-lockfile
          cd ../collector && yarn install --frozen-lockfile

      - name: Lint server
        run: |
          cd server && yarn lint:check
        continue-on-error: false

      - name: Lint frontend
        run: |
          cd frontend && yarn lint:check
        continue-on-error: false

      - name: Lint collector
        run: |
          cd collector && yarn lint:check
        continue-on-error: false

      - name: Type-check server (TS 7+)
        run: |
          cd server && yarn type-check
        continue-on-error: false

      - name: Type-check frontend (TS 7+)
        run: |
          cd frontend && yarn type-check
        continue-on-error: false

      - name: Verify frontend translations and bundle graph
        run: |
          cd frontend
          yarn verify:translations
          yarn check:bundle

      - name: Test server
        run: |
          cd server && NODE_OPTIONS="--experimental-vm-modules" yarn test --ci
        continue-on-error: false

      - name: Test frontend
        run: |
          cd frontend && yarn test
        continue-on-error: false

      - name: Test collector
        run: |
          cd collector && yarn test --ci
        continue-on-error: false

      - name: Build frontend
        run: |
          cd frontend && yarn build

      - name: Report status
        if: success()
        run: echo "All checks passed (lint + test)"
