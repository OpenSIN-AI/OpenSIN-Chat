name: PR Lint & Test (GitHub-hosted)

# Run on every PR to main and on push to main.
# This is the required status check that gates mergeability.
# Self-hosted CI pipeline (on OCI VM) remains separate for deploy.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"
          cache-dependency-path: |
            frontend/yarn.lock
            server/yarn.lock

      - name: Install dependencies
        run: |
          cd frontend && yarn install --frozen-lockfile
          cd ../server && yarn install --frozen-lockfile

      - name: Lint server
        run: |
          cd server && yarn lint:check
        continue-on-error: false

      - name: Lint frontend
        run: |
          cd frontend && yarn lint:check
        continue-on-error: false

      # The package.json test scripts are already CI-ready:
      # server uses "jest --ci --passWithNoTests", frontend uses "vitest run".
      # Do NOT append --ci here — vitest does not know that flag and crashes.
      - name: Test server
        run: |
          cd server && yarn test
        continue-on-error: false

      - name: Test frontend
        run: |
          cd frontend && yarn test
        continue-on-error: false

      - name: Report status
        if: success()
        run: echo "All checks passed (lint + test)"
