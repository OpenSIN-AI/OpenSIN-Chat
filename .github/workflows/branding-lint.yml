name: Branding Lint

# OpenSIN-Chat — CI guard that "AnythingLLM" / "Mintplex Labs" brand strings
# only appear in the documented whitelist of files (THIRD-PARTY.md, BRANDING.md,
# the logo shim, the env-var compat layer, the vendored chat-embed widget, …).
# Fails the build on any new mention so accidental re-introduction is caught
# before merge.
#
# Docs: scripts/check-branding.doc.md

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  branding:
    name: Check branding
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run branding linter
        run: bash scripts/check-branding.sh
