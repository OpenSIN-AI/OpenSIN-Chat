name: Feature Request
description: Suggest a new feature or improvement for OpenSIN Chat.
title: "[FEATURE] "
labels: ["feature", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        We welcome feature ideas. Please describe the problem you want to solve, not just the solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What user or operator problem does this solve?
      placeholder: As a [role], I want [goal] so that [benefit].
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or change you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider? Why did you reject them?
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How would we know this feature is complete?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-checks
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: This aligns with the OpenSIN Chat use case (political research, knowledge management, assisted chat).
          required: true
