version: 2
updates:
  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: daily
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - medium-priority
    commit-message:
      prefix: "deps(server)"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - medium-priority
    commit-message:
      prefix: "deps(root)"

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: daily
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - medium-priority
    commit-message:
      prefix: "deps(frontend)"

  - package-ecosystem: npm
    directory: /collector
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - low-priority
    commit-message:
      prefix: "deps(collector)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - medium-priority
    commit-message:
      prefix: "deps(ci)"
